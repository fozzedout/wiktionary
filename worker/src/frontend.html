<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dictionary API Tester</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e1e4ea;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: #fff;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #6b7280;
    margin-bottom: 2rem;
  }
  .search-box {
    display: flex;
    gap: 0.5rem;
    width: 100%;
    max-width: 480px;
    margin-bottom: 1.5rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.7rem 1rem;
    font-size: 1.1rem;
    border: 2px solid #2a2d37;
    border-radius: 8px;
    background: #1a1d27;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #3b82f6; }
  input[type="text"]::placeholder { color: #4b5563; }
  button {
    padding: 0.7rem 1.4rem;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  button:hover { background: #2563eb; }
  button:disabled { background: #374151; cursor: default; }
  .result-card {
    width: 100%;
    max-width: 480px;
    background: #1a1d27;
    border: 1px solid #2a2d37;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .result-header {
    padding: 1rem 1.2rem 0.6rem;
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
  }
  .result-word {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
  }
  .result-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-found { background: #065f46; color: #6ee7b7; }
  .badge-not-found { background: #7f1d1d; color: #fca5a5; }
  .defs-list {
    list-style: none;
    padding: 0 1.2rem 1rem;
  }
  .defs-list li {
    padding: 0.6rem 0;
    border-top: 1px solid #2a2d37;
    line-height: 1.5;
  }
  .pos-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    font-style: italic;
    color: #93c5fd;
    margin-right: 0.4rem;
    min-width: 3rem;
  }
  .error-msg {
    width: 100%;
    max-width: 480px;
    padding: 0.8rem 1rem;
    background: #451a1a;
    border: 1px solid #7f1d1d;
    border-radius: 8px;
    color: #fca5a5;
    font-size: 0.9rem;
  }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid #374151;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .stats {
    font-size: 0.75rem;
    color: #4b5563;
    padding: 0.4rem 1.2rem 0.8rem;
  }
  .history {
    width: 100%;
    max-width: 480px;
    margin-top: 1rem;
  }
  .history-title {
    font-size: 0.8rem;
    color: #4b5563;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .history-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .chip {
    padding: 0.3rem 0.7rem;
    font-size: 0.8rem;
    background: #1a1d27;
    border: 1px solid #2a2d37;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .chip:hover { border-color: #3b82f6; color: #fff; }
  .chip.found { border-left: 3px solid #059669; }
  .chip.not-found { border-left: 3px solid #dc2626; }
  footer {
    margin-top: auto;
    padding-top: 2rem;
    font-size: 0.75rem;
    color: #374151;
  }
</style>
</head>
<body>

<h1>Dictionary Lookup</h1>
<p class="subtitle">Search the dictionary database</p>

<div class="search-box">
  <input type="text" id="word-input" placeholder="Type a word..." autofocus autocomplete="off" spellcheck="false">
  <button id="search-btn" onclick="doSearch()">Look up</button>
</div>

<div id="results"></div>

<div class="history" id="history-section" style="display:none">
  <div class="history-title">Recent</div>
  <div class="history-chips" id="history-chips"></div>
</div>

<footer>Dictionary API Tester</footer>

<script>
const input = document.getElementById('word-input');
const btn = document.getElementById('search-btn');
const results = document.getElementById('results');
const historySection = document.getElementById('history-section');
const historyChips = document.getElementById('history-chips');

// API key — injected by the worker or set manually for testing
const API_KEY = '{{API_KEY}}';
let history = JSON.parse(localStorage.getItem('dict_history') || '[]');

renderHistory();

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const word = input.value.trim();
  if (!word) return;

  btn.disabled = true;
  results.innerHTML = '<span class="spinner"></span> Looking up...';

  const t0 = performance.now();
  try {
    const headers = {};
    if (API_KEY && API_KEY !== '{{API_KEY}}') {
      headers['X-API-Key'] = API_KEY;
    }
    const res = await fetch(`/api/definitions?word=${encodeURIComponent(word)}`, { headers });
    const ms = (performance.now() - t0).toFixed(0);
    const data = await res.json();

    if (data.error) {
      results.innerHTML = `<div class="error-msg">${esc(data.error)}</div>`;
      return;
    }

    addHistory(word, data.found);
    results.innerHTML = renderResult(data, ms);
  } catch (err) {
    results.innerHTML = `<div class="error-msg">Request failed: ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    input.select();
  }
}

function renderResult(data, ms) {
  const badge = data.found
    ? '<span class="result-badge badge-found">Found</span>'
    : '<span class="result-badge badge-not-found">Not found</span>';

  let html = `<div class="result-card">
    <div class="result-header">
      <span class="result-word">${esc(data.word)}</span>
      ${badge}
    </div>`;

  if (data.definitions && data.definitions.length) {
    html += '<ul class="defs-list">';
    for (const d of data.definitions) {
      const pos = d.pos ? `<span class="pos-tag">${esc(d.pos)}</span>` : '';
      html += `<li>${pos}${esc(d.definition)}</li>`;
    }
    html += '</ul>';
  }

  html += `<div class="stats">${ms}ms &middot; ${data.definitions?.length || 0} definition(s)</div>`;
  html += '</div>';
  return html;
}

function addHistory(word, found) {
  history = history.filter(h => h.word !== word);
  history.unshift({ word, found });
  if (history.length > 20) history.length = 20;
  localStorage.setItem('dict_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (!history.length) { historySection.style.display = 'none'; return; }
  historySection.style.display = '';
  historyChips.innerHTML = history.map(h =>
    `<span class="chip ${h.found ? 'found' : 'not-found'}" onclick="searchWord('${esc(h.word)}')">${esc(h.word)}</span>`
  ).join('');
}

function searchWord(w) {
  input.value = w;
  doSearch();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
